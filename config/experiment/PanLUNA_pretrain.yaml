# @package _global_
tag: PanLUNA_pretrain
model_size: tiny
gpus: 4
num_nodes: 1
num_workers: 8
batch_size: 1024

final_validate: True
final_test: False
resume: False
pretrained_checkpoint_path: null
freeze_encoder: False
io:
  checkpoint_dirpath: "#CHANGEME"
  checkpoint_filepath: null

defaults:
  - override /data_module: multiloader_data_module_PanLUNA
  - override /model: PanLUNA_pretrain
  - override /scheduler: cosine
  - override /task: pretrain_task_PanLUNA
  - override /criterion: pretrain_criterion

query_specialization_criterion:
  loss_type: 'l2'
  loss_coeff: 0.8

finetuning:
  mode: null

model: 
  patch_size: 32
  embed_dim: 64
  num_heads: 2
  depth: 6
  num_queries: 4
  mlp_ratio: 4
  drop_path: 0.0
  num_classes: 0

masking:
  patch_size: [1, 32]
  masking_ratio: 0.5
  unmasked_loss_coeff: 0.05

input_normalization:
  normalize: True

scheduler:
  trainer: ${trainer}
  min_lr: 2.5e-7 # minimum LR for the cosine scheduler
  warmup_lr_init: 2.5e-7 # initial LR for the warmup phase 
  warmup_epochs: 10

trainer:
  accelerator: gpu
  num_nodes: ${num_nodes}
  devices: ${gpus}
  max_epochs: 150
  strategy: ddp
  accumulate_grad_batches: 1
  check_val_every_n_epoch: 1
  use_distributed_sampler: False
  precision: bf16-mixed
  gradient_clip_val: 1.0

model_checkpoint:
  save_last: True
  monitor: "val_loss"
  mode: "min"
  save_top_k: 1

optimizer:
  optim: 'AdamW'
  lr: 1.25e-4
  betas: [0.9, 0.98]
  weight_decay: 0.05